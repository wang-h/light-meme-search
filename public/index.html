<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Meme Search</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #60a5fa;
    --accent-dim: rgba(96,165,250,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'SF Pro', sans-serif; background: var(--bg); color: var(--text); }
  .app { display: flex; height: 100vh; }

  .sidebar {
    width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px 0; flex-shrink: 0;
  }
  .sidebar h2 { font-size: 12px; color: var(--text-dim); padding: 0 16px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .sidebar-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 16px; cursor: pointer; font-size: 14px; color: var(--text-dim);
    transition: all .15s;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { color: var(--accent); background: var(--accent-dim); }
  .sidebar-item .count { font-size: 11px; opacity: .6; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .search-box {
    flex: 1; max-width: 400px; padding: 8px 14px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 14px; outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  .grid-wrap { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--surface); border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); cursor: pointer; transition: transform .15s, box-shadow .15s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.4); }
  .card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
  .card .info { padding: 8px 10px; }
  .card .tag { font-size: 11px; color: var(--accent); background: var(--accent-dim); padding: 2px 6px; border-radius: 4px; display: inline-block; }
  .card .cat { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .loading { text-align: center; padding: 40px; color: var(--text-dim); }

  .pagination { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; justify-content: center; }
  .pagination button {
    padding: 6px 14px; border-radius: 6px; background: var(--surface2);
    border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 13px;
  }
  .pagination button:disabled { opacity: .4; cursor: default; }
  .pagination span { font-size: 13px; color: var(--text-dim); }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  }
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <h2>分类</h2>
    <div class="sidebar-item active" data-cat="">全部</div>
  </nav>
  <div class="main">
    <div class="header">
      <h1>Light Meme Search</h1>
      <input class="search-box" id="search" type="text" placeholder="搜索表情包..." />
    </div>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
      <div class="loading" id="loading" style="display:none">加载中...</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
const API = '';
let currentCat = '';
let currentPage = 1;
const LIMIT = 40;
let searchMode = false;

const $sidebar = document.getElementById('sidebar');
const $grid = document.getElementById('grid');
const $loading = document.getElementById('loading');
const $pagination = document.getElementById('pagination');
const $search = document.getElementById('search');

async function loadCategories() {
  const res = await fetch(`${API}/api/memes/categories`);
  const { categories } = await res.json();
  categories.forEach(({ name, count }) => {
    const el = document.createElement('div');
    el.className = 'sidebar-item';
    el.dataset.cat = name;
    el.innerHTML = `<span>${name}</span><span class="count">${count}</span>`;
    $sidebar.appendChild(el);
  });
}

async function loadMemes(page = 1) {
  searchMode = false;
  currentPage = page;
  $loading.style.display = '';
  $grid.innerHTML = '';
  const catParam = currentCat ? `&category=${encodeURIComponent(currentCat)}` : '';
  const res = await fetch(`${API}/api/memes?page=${page}&limit=${LIMIT}${catParam}`);
  const { total, items } = await res.json();
  $loading.style.display = 'none';
  renderGrid(items);
  renderPagination(total);
}

async function searchMemes(query) {
  searchMode = true;
  $loading.style.display = '';
  $grid.innerHTML = '';
  $pagination.innerHTML = '';
  try {
    const res = await fetch(`${API}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, top_k: 20 }),
    });
    const { results } = await res.json();
    $loading.style.display = 'none';
    renderGrid(results.map(r => ({ ...r, filename: '' })));
  } catch {
    $loading.style.display = 'none';
    $grid.innerHTML = '<div class="empty">搜索失败</div>';
  }
}

function renderGrid(items) {
  if (items.length === 0) {
    $grid.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }
  items.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    const tag = m.tags && m.tags.length > 0 ? m.tags[m.tags.length - 1] : '';
    card.innerHTML = `
      <img src="${m.url}" alt="${tag}" loading="lazy" onerror="this.style.display='none'">
      <div class="info">
        ${tag ? `<span class="tag">${tag}</span>` : ''}
        <div class="cat">${m.category || ''}</div>
      </div>
    `;
    $grid.appendChild(card);
  });
}

function renderPagination(total) {
  const pages = Math.ceil(total / LIMIT);
  if (pages <= 1) { $pagination.innerHTML = ''; return; }
  $pagination.innerHTML = '';
  const prev = document.createElement('button');
  prev.textContent = '上一页';
  prev.disabled = currentPage <= 1;
  prev.onclick = () => loadMemes(currentPage - 1);
  const info = document.createElement('span');
  info.textContent = `${currentPage} / ${pages} (${total})`;
  const next = document.createElement('button');
  next.textContent = '下一页';
  next.disabled = currentPage >= pages;
  next.onclick = () => loadMemes(currentPage + 1);
  $pagination.append(prev, info, next);
}

$sidebar.addEventListener('click', e => {
  const item = e.target.closest('.sidebar-item');
  if (!item) return;
  $sidebar.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  item.classList.add('active');
  currentCat = item.dataset.cat;
  $search.value = '';
  loadMemes(1);
});

let searchTimer;
$search.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = $search.value.trim();
  if (!q) { loadMemes(1); return; }
  searchTimer = setTimeout(() => searchMemes(q), 400);
});

loadCategories().then(() => loadMemes(1));
</script>
</body>
</html>
